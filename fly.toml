app = 'core-connect'
primary_region = 'ord'
min_machines_running = 1

[build]

[deploy]
  release_command = "/app/.venv/bin/python setup_db.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024