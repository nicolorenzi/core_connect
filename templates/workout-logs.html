<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreConnect Workout Logs</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <style>
    .workout-exercise-heading {
      display: inline-flex;
      position: relative;
    }

    .workout-exercise-clickable {
      cursor: pointer;
    }

    .workout-exercise-clickable::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 100%;
      height: 2px;
      background: linear-gradient(120deg, #34d399, #38bdf8, #a5b4fc);
      transform: scaleX(0);
      transform-origin: left;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .workout-exercise-clickable:hover::after,
    .workout-exercise-clickable:focus-visible::after {
      transform: scaleX(1);
      opacity: 1;
    }

    .workout-exercise-clickable:hover {
      color: #7dd3fc;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-950 text-white">
  <div class="min-h-screen bg-slate-900/40">
    <div class="mx-auto max-w-5xl space-y-6 px-4 py-8 sm:px-6 lg:px-8">

      <div class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
        <div class="space-y-1">
          <p class="text-xs font-semibold uppercase tracking-[0.6em] text-slate-400">Workout</p>
          <h1 class="text-2xl font-semibold text-white sm:text-3xl">Workout Logs</h1>
          <p class="text-sm text-slate-300">Review your logged sessions in one elegant timeline.</p>
        </div>
        <a href="{{ url_for('dashboard') }}"
          class="w-full rounded-full border border-white/30 px-4 py-2 text-center text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-white/10 md:w-auto">Back
          to Dashboard</a>
      </div>

      <div class="flex items-center justify-between rounded-2xl border border-white/10 bg-white/5 px-4 py-3">
        <button id="prevDay" class="rounded-full p-2 text-slate-300 transition hover:bg-white/10 hover:text-white">
          &#8592;
        </button>
        <span id="currentDateLabel" class="text-sm font-semibold text-white"></span>
        <button id="nextDay" class="rounded-full p-2 text-slate-300 transition hover:bg-white/10 hover:text-white">
          &#8594;
        </button>
      </div>

      <div id="workoutList" class="space-y-4"></div>

    </div>
  </div>

  <script>
    const monthFormatter = new Intl.DateTimeFormat('en-US', { month: 'long' });

    const getOrdinal = day => {
      if (day % 100 >= 11 && day % 100 <= 13) return 'th';
      return day % 10 === 1 ? 'st' : day % 10 === 2 ? 'nd' : day % 10 === 3 ? 'rd' : 'th';
    };

    const formatDate = isoDate => {
      const [year, month, day] = isoDate.split('-').map(Number);
      const parsed = new Date(year, month - 1, day);
      if (Number.isNaN(parsed.getTime())) return isoDate;
      return `${monthFormatter.format(parsed)} ${day}${getOrdinal(day)}, ${year}`;
    };

    const toIso = date => {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const setOrderValue = label => {
      if (label === 'W') return -1;
      const parsed = parseInt(label, 10);
      return Number.isNaN(parsed) ? Number.MAX_SAFE_INTEGER : parsed;
    };

    const formatSetHeading = label => (label === 'W' ? 'Warmup' : `Set ${label}`);

    let allWorkouts = [];
    let currentDate = new Date();
    let editMode = false;

    async function deleteExercise(exerciseId, targetDate) {
      try {
        const response = await fetch(`/api/exercises/${exerciseId}`, { method: 'DELETE' });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || 'Unable to remove that set right now.');
        }
        const workout = allWorkouts.find(w => w.date === targetDate);
        if (workout) {
          workout.exercises = workout.exercises.filter(item => item.id !== exerciseId);
        }
        renderDay();
      } catch (error) {
        console.error('Failed to delete exercise:', error);
        alert(error.message || 'Unable to delete the set.');
      }
    }

    function renderDay() {
      const isoToday = toIso(currentDate);
      document.getElementById('currentDateLabel').textContent = formatDate(isoToday);

      const container = document.getElementById('workoutList');
      container.innerHTML = '';

      const workout = allWorkouts.find(w => w.date === isoToday);

      if (!workout || workout.exercises.length === 0) {
        container.innerHTML = `
          <div class="rounded-3xl border border-white/10 bg-white/5 p-6 text-center text-sm text-slate-400">
            No workout logged for this day.
          </div>`;
        return;
      }

      const card = document.createElement('div');
      card.className = 'rounded-3xl border border-white/10 bg-gradient-to-br from-white/5 to-white/0 p-6 shadow-2xl shadow-black/40 space-y-6';

      const headerRow = document.createElement('div');
      headerRow.className = 'flex items-center justify-between gap-3';

      const count = document.createElement('p');
      count.className = 'text-xs font-semibold uppercase tracking-widest text-slate-400';
      count.textContent = `${workout.exercises.length} exercise${workout.exercises.length !== 1 ? 's' : ''}`;
      headerRow.appendChild(count);

      const editToggle = document.createElement('button');
      editToggle.type = 'button';
      editToggle.className = 'rounded-full border border-white/20 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-slate-200 transition hover:border-white/40 hover:text-white';
      editToggle.textContent = editMode ? 'Done' : 'Edit';
      editToggle.addEventListener('click', () => {
        editMode = !editMode;
        renderDay();
      });
      headerRow.appendChild(editToggle);

      card.appendChild(headerRow);

      const groupedByExercise = workout.exercises.reduce((acc, exercise) => {
        const name = exercise.name || 'Unknown Exercise';
        if (!acc[name]) {
          acc[name] = { sets: [], storedExerciseId: exercise.stored_exercise_id ?? null };
        }
        acc[name].sets.push(exercise);
        if (!acc[name].storedExerciseId && exercise.stored_exercise_id) {
          acc[name].storedExerciseId = exercise.stored_exercise_id;
        }
        return acc;
      }, {});

      const orderedGroups = Object.entries(groupedByExercise)
        .map(([name, group]) => ({
          name,
          sets: group.sets,
          storedExerciseId: group.storedExerciseId,
          order: group.sets.reduce(
            (minValue, set) => Math.min(minValue, setOrderValue(set.set_label)),
            Number.MAX_SAFE_INTEGER
          ),
        }))
        .sort((a, b) => {
          if (a.order === b.order) {
            return a.name.localeCompare(b.name);
          }
          return a.order - b.order;
        });

      orderedGroups.forEach(group => {
        const section = document.createElement('div');
        section.className = 'space-y-3';

        const sectionHeader = document.createElement('div');
        sectionHeader.className = 'flex items-center justify-between gap-3';

        const nameElement = document.createElement(group.storedExerciseId ? 'a' : 'p');
        nameElement.className = 'text-base font-semibold text-white transition hover:text-sky-300 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-500 workout-exercise-heading';
        nameElement.textContent = group.name;
        if (group.storedExerciseId) {
          nameElement.href = `/progress-tracker/exercise/${group.storedExerciseId}`;
          nameElement.setAttribute('aria-label', `View progress details for ${group.name}`);
          nameElement.classList.add('workout-exercise-clickable');
        }
        sectionHeader.appendChild(nameElement);

        const setCount = document.createElement('span');
        setCount.className = 'text-xs uppercase tracking-widest text-slate-400';
        setCount.textContent = `${group.sets.length} set${group.sets.length !== 1 ? 's' : ''}`;
        sectionHeader.appendChild(setCount);

        section.appendChild(sectionHeader);

        const sortedSets = [...group.sets].sort((a, b) => {
          const orderA = setOrderValue(a.set_label);
          const orderB = setOrderValue(b.set_label);
          if (orderA === orderB) {
            return a.id - b.id;
          }
          return orderA - orderB;
        });

        sortedSets.forEach(set => {
          const row = document.createElement('div');
          row.className = 'flex items-center justify-between gap-4 rounded-2xl border border-white/10 bg-white/5 p-6';

          const info = document.createElement('div');
          info.className = 'space-y-1';
          info.innerHTML = `
            <p class="text-sm font-semibold text-white">${formatSetHeading(set.set_label)}</p>
            <p class="text-xs text-slate-400 mt-0.5">${set.repetitions} reps &middot; ${set.weight} lbs</p>
          `;
          row.appendChild(info);

          if (editMode) {
            const removeButton = document.createElement('button');
            removeButton.type = 'button';
            removeButton.className = 'h-9 w-9 items-center justify-center rounded-full border border-rose-500/40 text-rose-200 transition hover:bg-rose-500/20 focus:outline-none';
            removeButton.innerHTML = '<span aria-hidden="true">&#128465;</span>';
            removeButton.setAttribute('aria-label', 'Remove set');
            removeButton.addEventListener('click', () => deleteExercise(set.id, isoToday));
            row.appendChild(removeButton);
          }

          section.appendChild(row);
        });

        card.appendChild(section);
      });

      container.appendChild(card);
    }

    document.getElementById('prevDay').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() - 1);
      renderDay();
    });

    document.getElementById('nextDay').addEventListener('click', () => {
      currentDate.setDate(currentDate.getDate() + 1);
      renderDay();
    });

    fetch('/api/workouts')
      .then(r => r.json())
      .then(data => {
        allWorkouts = data;
        renderDay();
      })
      .catch(err => {
        console.error('Failed to fetch workouts:', err);
        document.getElementById('workoutList').innerHTML =
          '<div class="rounded-3xl border border-red-400 bg-red-500/10 p-4 text-sm text-red-200">Error loading workouts.</div>';
      });
  </script>
</body>
</html>
